<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#000005"/>
    </radialGradient>
    <linearGradient id="flame" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="50%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- stars -->
  <circle cx="10" cy="12" r="0.8" fill="#fff" opacity="0.9"/>
  <circle cx="52" cy="10" r="0.6" fill="#fff" opacity="0.7"/>
  <circle cx="14" cy="48" r="0.6" fill="#fff" opacity="0.8"/>
  <circle cx="50" cy="46" r="0.8" fill="#fff" opacity="0.9"/>
  <circle cx="48" cy="22" r="0.5" fill="#fff" opacity="0.7"/>
  <!-- rocket body -->
  <path d="M32 8 L26 22 L26 42 L38 42 L38 22 Z" fill="#e5e7eb" stroke="#94a3b8" stroke-width="0.8"/>
  <!-- nose cone tip highlight -->
  <path d="M32 8 L29 16 L35 16 Z" fill="#f8fafc"/>
  <!-- window -->
  <circle cx="32" cy="22" r="3" fill="#22d3ee" stroke="#0e7490" stroke-width="0.8"/>
  <circle cx="31" cy="21" r="0.8" fill="#fff" opacity="0.8"/>
  <!-- body stripes -->
  <rect x="26" y="28" width="12" height="1.5" fill="#dc2626"/>
  <rect x="26" y="32" width="12" height="1" fill="#0ea5e9"/>
  <!-- left fin -->
  <path d="M26 36 L20 46 L26 42 Z" fill="#dc2626"/>
  <!-- right fin -->
  <path d="M38 36 L44 46 L38 42 Z" fill="#dc2626"/>
  <!-- center fin -->
  <path d="M32 42 L30 48 L34 48 Z" fill="#94a3b8"/>
  <!-- flame -->
  <path d="M28 48 Q32 60 36 48 Q34 54 32 50 Q30 54 28 48 Z" fill="url(#flame)"/>
  <!-- inner flame -->
  <path d="M30 49 Q32 56 34 49 Q33 52 32 50 Q31 52 30 49 Z" fill="#fef3c7" opacity="0.85"/>
</svg>
